<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <title>Blog</title>
    <style>
        body { background: #f8f9fa; }
        .navbar { box-shadow: 0 2px 12px rgba(0,0,0,.04); }
        .footer-link { color: rgba(255,255,255,.75); text-decoration: none; }
        .footer-link:hover { color: #fff; }
    </style>
</head>
<body class="d-flex flex-column min-vh-100">
    <nav class="navbar navbar-expand-lg bg-white">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">My Blog</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" href="/">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/posts/">Posts</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/about/">About</a>
                    </li>
                </ul>
                <a class="btn btn-outline-primary btn-sm" href="/posts/">Open blog</a>
            </div>
        </div>
    </nav>

    <main class="flex-grow-1">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="bg-dark text-white py-5 mt-auto">
        <div class="container">
            <div class="row g-4">
                <div class="col-md-6">
                    <h5 class="fw-bold">My Blog</h5>
                    <p class="text-white-50 mb-0">Simple Django blog with posts, pages and a clean layout.</p>
                </div>
                <div class="col-md-3">
                    <h6 class="fw-semibold">Pages</h6>
                    <ul class="list-unstyled">
                        <li><a class="footer-link" href="/">Home</a></li>
                        <li><a class="footer-link" href="/posts/">Posts</a></li>
                        <li><a class="footer-link" href="/about/">About</a></li>
                    </ul>
                </div>
                <div class="col-md-3">
                    <h6 class="fw-semibold">Contact</h6>
                    <p class="text-white-50 mb-0">hello@example.com</p>
                </div>
            </div>
        </div>
    </footer>
</body>
</html>
