{% load static %}
{% extends 'base.html' %}
{% block content %}
<div class="container py-5">
    <div class="row align-items-center g-5">
        <div class="col-lg-7">
            <span class="badge bg-primary-subtle text-primary mb-3">Welcome</span>
            <h1 class="display-5 fw-bold mb-3">{{ post.title }}</h1>
            <p class="lead text-muted">{{ post.content }}</p>
            <div class="d-flex gap-2 flex-wrap">
                <a href="/posts/" class="btn btn-primary">Read posts</a>
                <a href="/about/" class="btn btn-outline-secondary">About this blog</a>
            </div>
        </div>
        <div class="col-lg-5">
            <div class="card border-0 shadow-sm overflow-hidden">
                {% if post.image %}
                    <img src="{{ post.image }}" class="card-img-top" alt="{{ post.title }}" style="height: 260px; object-fit: cover;">
                {% else %}
                    <img src="{% static 'images/hero.svg' %}" class="card-img-top" alt="Blog preview" style="height: 260px; object-fit: cover;">
                {% endif %}
                <div class="card-body">
                    <h5 class="card-title">{{ post.title }}</h5>
                    <p class="card-text text-muted mb-0">{{ post.content }}</p>
                    {% if post.rate %}
                        <p class="text-muted mt-3 mb-0">Rate: {{ post.rate }}</p>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
